app-id: io.github.spacecake_labs.spacecake
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: spacecake
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: node
    buildsystem: simple
    build-commands:
      - cp -r * /app/
      - mkdir -p /app/etc/node-headers
      - tar -xf node-v22.13.1-headers.tar.gz -C /app/etc/node-headers --strip-components=1 --no-same-owner
    sources:
      - type: archive
        url: https://nodejs.org/dist/v22.13.1/node-v22.13.1-linux-x64.tar.xz
        sha256: 0d2a5af33c7deab5555c8309cd3f373446fe1526c1b95833935ab3f019733b3b
      - type: file
        url: https://nodejs.org/dist/v22.13.1/node-v22.13.1-headers.tar.gz
        sha256: f9cde9ace585c3979f1b4ee247914f35fae6e7b7eabc6a40961f89ad39e78964

  - name: bun
    buildsystem: simple
    build-commands:
      - install -D bun /app/bin/bun
    sources:
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.1.0/bun-linux-x64.zip
        sha256: 5a17ea61356475a4a3a0def345c46875f2cf2b62b9efdb65b921045d35733853

  - name: spacecake
    buildsystem: simple
    build-options:
      append-path: /app/bin
      build-args:
        - --share=network
    build-commands:
      - |
        set -e
        npm install -g pnpm
        export npm_config_nodedir=/app/etc/node-headers
        export TAR_OPTIONS="--no-same-owner"
        export npm_config_unsafe_perm=true
        
        pnpm install --dir spacecake-app --no-frozen-lockfile
        bun install --cwd cli
        cd cli && bun run build
        cd ../spacecake-app && pnpm run package
        
        cd ..
        mkdir -p /app/share/spacecake
        cp -r spacecake-app/out/spacecake-linux-x64/* /app/share/spacecake/
        install -D spacecake.sh /app/bin/spacecake
        install -D io.github.spacecake_labs.spacecake.desktop /app/share/applications/io.github.spacecake_labs.spacecake.desktop
        install -D io.github.spacecake_labs.spacecake.metainfo.xml /app/share/metainfo/io.github.spacecake_labs.spacecake.metainfo.xml
        install -D icon.png /app/share/icons/hicolor/512x512/apps/io.github.spacecake_labs.spacecake.png
    sources:
      - type: git
        url: https://github.com/spacecake-labs/spacecake.git
        tag: v0.1.0-alpha.63
      - type: file
        path: spacecake.sh
      - type: file
        path: io.github.spacecake_labs.spacecake.desktop
      - type: file
        path: io.github.spacecake_labs.spacecake.metainfo.xml
      - type: file
        path: icon.png
