app-id: io.github.wygoralves.panes
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: panes
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=LD_LIBRARY_PATH=/app/lib

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin:/app/bin
  env:
    CARGO_HOME: /run/build/panes/cargo
    PNPM_HOME: /run/build/panes/pnpm
    XDG_CACHE_HOME: /run/build/panes/cache

modules:
  - name: node-runtime
    buildsystem: simple
    build-commands:
      - install -d /app/node /app/bin
      - cp -a ./* /app/node/
      - ln -sf /app/node/bin/node /app/bin/node
      - ln -sf /app/node/bin/npm /app/bin/npm
      - ln -sf /app/node/bin/npx /app/bin/npx
      - if [ -x /app/node/bin/corepack ]; then ln -sf /app/node/bin/corepack /app/bin/corepack; fi
    sources:
      - type: archive
        url: https://nodejs.org/dist/v24.14.1/node-v24.14.1-linux-x64.tar.xz
        sha256: 84d38715d449447117d05c3e71acd78daa49d5b1bfa8aacf610303920c3322be
        strip-components: 1

  - name: pnpm
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - npm install -g pnpm@10.33.0 --prefix=/app
    sources:
      - type: shell
        commands:
          - echo "Installing pnpm..."

  - ../shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: panes
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - |
        set -e
        export PATH="/app/bin:/usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin:$PATH"
        sed -i 's/"identifier": "com.panes.app"/"identifier": "io.github.wygoralves.panes"/' src-tauri/tauri.conf.json
        pnpm install --frozen-lockfile
        pnpm tauri build --no-bundle
        BIN_PATH=$(find src-tauri/target/release -maxdepth 1 -type f -executable \( -name panes -o -name Panes \) | head -n 1)
        test -n "$BIN_PATH"
        install -Dm755 "$BIN_PATH" /app/bin/panes
        for resource_dir in /app/lib/io.github.wygoralves.panes /app/lib/io.github.wygoralves.panes/sidecar-dist /app/lib/panes /app/lib/panes/sidecar-dist; do
          install -d "$resource_dir"
          install -Dm644 src-tauri/sidecar-dist/claude-agent-sdk-server.mjs "$resource_dir/claude-agent-sdk-server.mjs"
          install -Dm644 src-tauri/sidecar-dist/claude-sdk-node_modules.tar.gz "$resource_dir/claude-sdk-node_modules.tar.gz"
        done
        install -Dm644 io.github.wygoralves.panes.desktop /app/share/applications/io.github.wygoralves.panes.desktop
        install -Dm644 io.github.wygoralves.panes.metainfo.xml /app/share/metainfo/io.github.wygoralves.panes.metainfo.xml
        install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/io.github.wygoralves.panes.png
        ln -sf libappindicator3.so.1 /app/lib/libayatana-appindicator3.so.1
    sources:
      - type: git
        url: https://github.com/wygoralves/panes.git
        tag: v0.54.1
      - type: file
        path: io.github.wygoralves.panes.desktop
      - type: file
        path: io.github.wygoralves.panes.metainfo.xml
      - type: file
        path: icon.png
