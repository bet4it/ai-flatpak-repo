app-id: io.github.coulsontl.ai_toolbox
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: ai-toolbox
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-config/ai-toolbox:create
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin:/app/bin
  env:
    CARGO_HOME: /run/build/ai-toolbox/cargo
    PNPM_HOME: /run/build/ai-toolbox/pnpm
    XDG_CACHE_HOME: /run/build/ai-toolbox/cache

modules:
  - name: pnpm
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - npm install -g pnpm --prefix=/app
    sources:
      - type: shell
        commands:
          - "echo 'Installing pnpm...'"

  - name: intltool
    cleanup: [ "*" ]
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: dbus-glib
    cleanup: [ "*" ]
    sources:
      - type: archive
        url: https://dbus.freedesktop.org/releases/dbus-glib/dbus-glib-0.114.tar.gz
        sha256: c09c5c085b2a0e391b8ee7d783a1d63fe444e96717cc1814d61b5e8fc2827a7c

  - name: libdbusmenu
    config-opts:
      - --disable-static
      - --disable-gtk-doc
      - --enable-introspection=no
      - --disable-vala
      - --disable-dumper
      - --disable-tests
      - --with-gtk=3
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -Dgtk3=enabled
      - -Dauto_features=disabled
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.93.tar.gz
        sha256: d0ea996ca6006fa69bc9da600096cc60307bb0960cd00ecfc906660600aaeb63

  - name: ai-toolbox
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      # 1. Install dependencies
      - pnpm install
      # 2. Build frontend assets
      - pnpm build
      # 3. Build the production binary using Cargo directly
      - cargo build --manifest-path tauri/Cargo.toml --release
      # 4. Installation
      - BIN_PATH=$(find tauri/target/release -name ai-toolbox -type f -executable | grep -v "\.d$" | head -n 1);
        install -Dm755 "$BIN_PATH" /app/bin/ai-toolbox
      - install -Dm644 io.github.coulsontl.ai_toolbox.desktop -t /app/share/applications/
      - install -Dm644 io.github.coulsontl.ai_toolbox.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 icon.png /app/share/icons/hicolor/128x128/apps/io.github.coulsontl.ai_toolbox.png
    sources:
      - type: git
        url: https://github.com/coulsontl/ai-toolbox.git
        tag: v0.7.7
      - type: file
        path: io.github.coulsontl.ai_toolbox.desktop
      - type: file
        path: io.github.coulsontl.ai_toolbox.metainfo.xml
      - type: file
        path: icon.png
