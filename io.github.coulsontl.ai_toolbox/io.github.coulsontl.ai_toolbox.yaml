app-id: io.github.coulsontl.ai_toolbox
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: ai-toolbox
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-config/ai-toolbox:create
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin:/app/bin
  env:
    CARGO_HOME: /run/build/ai-toolbox/cargo
    PNPM_HOME: /run/build/ai-toolbox/pnpm
    XDG_CACHE_HOME: /run/build/ai-toolbox/cache

modules:
  - name: pnpm
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - npm install -g pnpm --prefix=/app
    sources:
      - type: shell
        commands:
          - "echo 'Installing pnpm...'"

  - name: libdbusmenu
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a
    build-options:
      cflags: -Wno-error
    config-opts:
      - --disable-doxygen
      - --disable-gtk

  - name: libappindicator
    sources:
      - type: archive
        url: https://launchpad.net/libappindicator/12.10/12.10.0/+download/libappindicator3-12.10.0.tar.gz
        sha256: 91edc1cae442549f11ca4a71083bf3b3f212497f08e8adca35dbd6ee11caeead
    build-options:
      cflags: -Wno-error
    config-opts:
      - --with-gtk=3

  - name: ai-toolbox
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      # Frontend build
      - pnpm install --frozen-lockfile
      - pnpm build
      # Rust/Tauri build
      - cargo build --manifest-path tauri/Cargo.toml --release
      # Installation
      - BIN_PATH=$(find . -name ai-toolbox -type f -executable | grep release | head -n 1);
        install -Dm755 "$BIN_PATH" /app/bin/ai-toolbox
      - install -Dm644 io.github.coulsontl.ai_toolbox.desktop -t /app/share/applications/
      - install -Dm644 io.github.coulsontl.ai_toolbox.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 icon.png /app/share/icons/hicolor/128x128/apps/io.github.coulsontl.ai_toolbox.png
    sources:
      - type: git
        url: https://github.com/coulsontl/ai-toolbox.git
        tag: v0.7.7
      - type: file
        path: io.github.coulsontl.ai_toolbox.desktop
      - type: file
        path: io.github.coulsontl.ai_toolbox.metainfo.xml
      - type: file
        path: icon.png
