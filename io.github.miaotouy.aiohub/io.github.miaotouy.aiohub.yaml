app-id: io.github.miaotouy.aiohub
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: aiohub
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=LD_LIBRARY_PATH=/app/lib

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin:/app/bin
  env:
    CARGO_HOME: /run/build/aiohub/cargo
    XDG_CACHE_HOME: /run/build/aiohub/cache
    BUN_INSTALL_CACHE_DIR: /run/build/aiohub/bun-cache

modules:
  - name: bun
    buildsystem: simple
    build-commands:
      - install -Dm755 bun /app/bin/bun
    sources:
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.12/bun-linux-x64.zip
        sha256: 11dc3ee11bc1695e149737c6ca3d5619302cf4346e6b8a6ec7988967ef01ddc5

  - ../shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: aiohub
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - |
        set -e
        export PATH="/app/bin:/usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin:$PATH"
        sed -i 's/"identifier": "com.mty.aiohub"/"identifier": "io.github.miaotouy.aiohub"/' src-tauri/tauri.conf.json
        bun install --frozen-lockfile
        bun run tauri build --no-bundle
        BIN_PATH=$(find src-tauri/target/release -maxdepth 1 -type f -executable -name aiohub | head -n 1)
        test -n "$BIN_PATH"
        install -Dm755 "$BIN_PATH" /app/bin/aiohub
        install -Dm644 io.github.miaotouy.aiohub.desktop /app/share/applications/io.github.miaotouy.aiohub.desktop
        install -Dm644 io.github.miaotouy.aiohub.metainfo.xml /app/share/metainfo/io.github.miaotouy.aiohub.metainfo.xml
        install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/io.github.miaotouy.aiohub.png
        ln -sf libappindicator3.so.1 /app/lib/libayatana-appindicator3.so.1
    sources:
      - type: git
        url: https://github.com/miaotouy/aio-hub.git
        tag: v0.5.0-r.1
      - type: file
        path: io.github.miaotouy.aiohub.desktop
      - type: file
        path: io.github.miaotouy.aiohub.metainfo.xml
      - type: file
        path: icon.png
