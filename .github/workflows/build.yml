name: Build and Deploy Flatpak Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: Build all apps instead of only changed apps
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  discover:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}
      removed_app_ids: ${{ steps.set-matrix.outputs.removed_app_ids }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: set-matrix
        run: |
          set -euo pipefail

          json_array() {
            if [ "$#" -eq 0 ]; then
              printf '[]'
            else
              printf '%s\n' "$@" | jq -R . | jq -sc 'map(select(length > 0))'
            fi
          }

          declare -a ALL_APPS=()
          for manifest in */*.yaml; do
            [ -f "$manifest" ] || continue

            app_dir=${manifest%%/*}
            manifest_name=${manifest##*/}
            [ "$manifest_name" = "$app_dir.yaml" ] || continue

            app_id=$(grep -m1 -E '^app-id:[[:space:]]*' "$manifest" | cut -d: -f2- | xargs || true)
            [ -n "$app_id" ] || continue
            [ "$app_id" = "$app_dir" ] || continue

            ALL_APPS+=("$app_id")
          done

          ALL_JSON=$(json_array "${ALL_APPS[@]}")
          MATRIX_JSON='[]'
          REMOVED_JSON='[]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_rebuild }}" = "true" ]; then
            MATRIX_JSON="$ALL_JSON"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              MATRIX_JSON="$ALL_JSON"
            else
              CHANGED_FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")

              if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(shared-modules(/|$)|\.gitmodules$|\.github/workflows/build\.yml$)'; then
                MATRIX_JSON="$ALL_JSON"
              else
                declare -A CHANGED_APP_MAP=()
                while IFS= read -r path; do
                  [ -n "$path" ] || continue

                  first=${path%%/*}
                  [ -n "$first" ] || continue
                  case "$first" in
                    .*) continue ;;
                  esac

                  manifest="$first/$first.yaml"
                  if [ -f "$manifest" ]; then
                    CHANGED_APP_MAP["$first"]=1
                  fi
                done <<< "$CHANGED_FILES"

                declare -a MATRIX_APPS=()
                for app in "${ALL_APPS[@]}"; do
                  if [ -n "${CHANGED_APP_MAP[$app]+x}" ]; then
                    MATRIX_APPS+=("$app")
                  fi
                done

                MATRIX_JSON=$(json_array "${MATRIX_APPS[@]}")
              fi

              declare -A REMOVED_APP_MAP=()
              while IFS=$'\t' read -r status first_path second_path; do
                [ -n "$status" ] || continue

                old_path=''
                case "$status" in
                  D*) old_path=$first_path ;;
                  R*) old_path=$first_path ;;
                  *) continue ;;
                esac

                [ -n "$old_path" ] || continue

                first=${old_path%%/*}
                if [ "$old_path" = "$first/$first.yaml" ]; then
                  REMOVED_APP_MAP["$first"]=1
                fi
              done < <(git diff --name-status --find-renames "$BEFORE" "${{ github.sha }}")

              declare -a REMOVED_APPS=()
              for app in "${!REMOVED_APP_MAP[@]}"; do
                REMOVED_APPS+=("$app")
              done
              IFS=$'\n' REMOVED_APPS=($(sort <<<"${REMOVED_APPS[*]}"))
              unset IFS

              REMOVED_JSON=$(json_array "${REMOVED_APPS[@]}")
            fi
          fi

          if [ "$MATRIX_JSON" != '[]' ] || [ "$REMOVED_JSON" != '[]' ]; then
            SHOULD_RUN=true
          else
            SHOULD_RUN=false
          fi

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "removed_app_ids=$REMOVED_JSON" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  build:
    name: Build Flatpak
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Build App
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: ${{ matrix.app }}/${{ matrix.app }}.yaml
          branch: stable
          cache: true
          cache-key: flatpak-builder-${{ matrix.app }}-${{ github.sha }}

  reconstruct:
    name: Reconstruct Repository
    needs: [discover, build]
    if: ${{ needs.discover.outputs.should_run == 'true' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - name: Resolve Previous Repo Seed
        id: seed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUNS_API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=success&per_page=10"
          SUCCESS_RUN_IDS=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$RUNS_API" | jq -r '.workflow_runs[]?.id // empty')

          while IFS= read -r PREVIOUS_RUN_ID; do
            [ -n "$PREVIOUS_RUN_ID" ] || continue

            ARTIFACTS_API="https://api.github.com/repos/${{ github.repository }}/actions/runs/${PREVIOUS_RUN_ID}/artifacts"
            FINAL_REPO_ARTIFACT_ID=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$ARTIFACTS_API" | jq -r '.artifacts[]? | select(.name == "final-repo" and (.expired | not)) | .id' | head -n1)

            if [ -n "$FINAL_REPO_ARTIFACT_ID" ]; then
              echo "run_id=$PREVIOUS_RUN_ID" >> "$GITHUB_OUTPUT"
              echo "artifact_id=$FINAL_REPO_ARTIFACT_ID" >> "$GITHUB_OUTPUT"
              break
            fi
          done <<< "$SUCCESS_RUN_IDS"

      - name: Download Previous Repo Seed
        if: ${{ steps.seed.outputs.artifact_id != '' }}
        uses: actions/download-artifact@v8
        with:
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.seed.outputs.run_id }}
          artifact-ids: ${{ steps.seed.outputs.artifact_id }}
          path: repo

      - name: Download All Bundles
        if: ${{ needs.discover.outputs.matrix != '[]' }}
        uses: actions/download-artifact@v8
        with:
          path: bundles
          merge-multiple: true

      - name: Initialize and Import
        run: |
          set -euo pipefail

          mkdir -p bundles repo
          if [ -d bundles ]; then
            ls -R bundles/
          fi

          if [ -d repo/final-repo ]; then
            cp -a repo/final-repo/. repo/
            rm -rf repo/final-repo
          fi

          touch repo/.nojekyll

          if [ ! -f repo/config ]; then
            ostree init --repo=repo --mode=archive-z2

            if curl -fsI https://bet4it.github.io/ai-flatpak-repo/summary >/dev/null; then
              ostree --repo=repo remote add --if-not-exists --no-gpg-verify published https://bet4it.github.io/ai-flatpak-repo/
              for attempt in 1 2 3; do
                if ostree --repo=repo pull --mirror published; then
                  break
                fi

                if [ "$attempt" -eq 3 ]; then
                  exit 1
                fi

                sleep $((attempt * 15))
              done
              ostree --repo=repo remote delete --if-exists published
            fi
          fi

          REMOVED_APP_IDS='${{ needs.discover.outputs.removed_app_ids }}'
          jq -r '.[]' <<<"$REMOVED_APP_IDS" | while IFS= read -r app_id; do
            [ -n "$app_id" ] || continue
            ostree --repo=repo refs --delete "app/$app_id" || true
            ostree --repo=repo refs --delete "runtime/$app_id.Debug" || true
          done

          mkdir -p repo/refs/remotes
          find bundles/ -name "*.flatpak" -print0 | xargs -0 -r -I {} sh -c 'echo "Importing {}..."; flatpak build-import-bundle repo "{}"'
          flatpak build-update-repo --generate-static-deltas --prune repo

      - name: Upload Final Repo
        uses: actions/upload-artifact@v7
        with:
          name: final-repo
          path: repo/

  deploy:
    name: Deploy to GitHub Pages
    needs: [discover, reconstruct]
    if: ${{ needs.discover.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Final Repo
        uses: actions/download-artifact@v8
        with:
          name: final-repo
          path: repo

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
