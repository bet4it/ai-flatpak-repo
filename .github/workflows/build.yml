name: Build and Deploy Flatpak Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  discover:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          DIRS=$(find . -maxdepth 2 -not -path '*/.*' -name "*.yaml" | xargs -I {} dirname {} | sed 's|^\./||' | sort -u | jq -R . | jq -s -c .)
          echo "matrix=$DIRS" >> $GITHUB_OUTPUT

  build:
    name: Build Flatpak
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - name: Build App
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: ${{ matrix.app }}/${{ matrix.app }}.yaml
          branch: stable
          # Export to a local repo within the container
          repository-name: local-repo
          repository-url: https://flathub.org/repo/flathub.flatpakrepo
          cache: true
          cache-key: flatpak-builder-${{ matrix.app }}-${{ github.sha }}

      - name: Upload Repo Segment
        uses: actions/upload-artifact@v4
        with:
          name: repo-${{ matrix.app }}
          path: repo/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download All Repo Segments
        uses: actions/download-artifact@v4
        with:
          pattern: repo-*
          path: segments

      - name: Reconstruct Repository
        run: |
          sudo apt-get update && sudo apt-get install -y flatpak ostree rsync
          mkdir -p repo
          ostree init --repo=repo --mode=archive-z2
          touch repo/.nojekyll
          
          # Use ostree pull-local to merge repo segments correctly
          # This preserves the AppStream branch generated by flatpak-builder
          for d in segments/repo-*; do
            echo "Merging $d..."
            ostree --repo=repo pull-local "$d"
          done
          
          # Final update
          flatpak build-update-repo --generate-static-deltas repo
          
          # Verification: Check if AppStream data exists
          ostree --repo=repo refs
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
