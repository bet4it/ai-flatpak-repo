name: Build and Deploy Flatpak Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  discover:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          DIRS=$(find . -maxdepth 2 -not -path '*/.*' -name "*.yaml" | xargs -I {} dirname {} | sed 's|^\./||' | sort -u | jq -R . | jq -s -c .)
          echo "matrix=$DIRS" >> $GITHUB_OUTPUT

  build:
    name: Build Flatpak
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.matrix) }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - name: Build App
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: ${{ matrix.app }}/${{ matrix.app }}.yaml
          branch: stable
          cache: true
          cache-key: flatpak-builder-${{ matrix.app }}-${{ github.sha }}

  reconstruct:
    name: Reconstruct Repository
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - name: Download All Bundles
        uses: actions/download-artifact@v4
        with:
          pattern: "*-x86_64"
          merge-multiple: true
          path: bundles

      - name: Initialize and Import
        run: |
          mkdir -p repo
          ostree init --repo=repo --mode=archive-z2
          touch repo/.nojekyll
          find bundles/ -name "*.flatpak" -print0 | xargs -0 -I {} sh -c 'echo "Importing {}..."; flatpak build-import-bundle repo "{}"'
          # Use modern flatpak to update repo with appstream metadata
          flatpak build-update-repo --generate-static-deltas repo

      - name: Upload Final Repo
        uses: actions/upload-artifact@v4
        with:
          name: final-repo
          path: repo/

  deploy:
    name: Deploy to GitHub Pages
    needs: reconstruct
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Final Repo
        uses: actions/download-artifact@v4
        with:
          name: final-repo
          path: repo

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
