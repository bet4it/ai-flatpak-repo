app-id: com.zhukunpenglinyutong.ccgui
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.llvm21
command: ccgui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications

build-options:
  append-path: /usr/lib/sdk/llvm21/bin:/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin:/app/bin
  env:
    CARGO_HOME: /run/build/ccgui/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm21/lib
    XDG_CACHE_HOME: /run/build/ccgui/cache

modules:
  - name: ccgui
    buildsystem: simple
    build-options:
      build-args: ["--share=network"]
    build-commands:
      - |
        python3 - <<'PY'
        from pathlib import Path

        def patch_file(path_str, replacements):
            path = Path(path_str)
            text = path.read_text(encoding="utf-8")
            for old, new in replacements:
                if old not in text:
                    raise SystemExit(f"expected text not found in {path}: {old}")
                text = text.replace(old, new, 1)
            path.write_text(text, encoding="utf-8")

        patch_file(
            "src/features/update/hooks/useUpdater.ts",
            [
                (
                    "const AUTO_UPDATE_ENABLED = true;",
                    "const AUTO_UPDATE_ENABLED = false;",
                ),
                (
                    "  const checkForUpdates = useCallback(async (options?: { announceNoUpdate?: boolean }) => {\n",
                    "  const checkForUpdates = useCallback(async (options?: { announceNoUpdate?: boolean }) => {\n"
                    "    if (!effectiveEnabled) {\n"
                    "      setState({ stage: \"idle\" });\n"
                    "      return;\n"
                    "    }\n",
                ),
                (
                    "  const startUpdate = useCallback(async () => {\n",
                    "  const startUpdate = useCallback(async () => {\n"
                    "    if (!effectiveEnabled) {\n"
                    "      setState({ stage: \"idle\" });\n"
                    "      return;\n"
                    "    }\n\n",
                ),
                (
                    "  }, [checkForUpdates, onDebug]);\n",
                    "  }, [checkForUpdates, effectiveEnabled, onDebug]);\n",
                ),
            ],
        )

        patch_file(
            "src/features/app/hooks/useWorkspaceActions.ts",
            [
                (
                    "      if (\n"
                    "        message.startsWith(\"CLI_NOT_FOUND:\") ||\n"
                    "        message.includes(\"No such file or directory\") ||\n"
                    "        message.includes(\"Failed to execute claude\") ||\n"
                    "        message.includes(\"Failed to execute codex\")\n"
                    "      ) {\n"
                    "        return `${t(\"errors.cliNotFound\")}\\n\\n${t(\"errors.cliNotFoundHint\")}`;\n"
                    "      }\n",
                    "      if (message.startsWith(\"CLI_NOT_FOUND:\")) {\n"
                    "        return `${t(\"errors.cliNotFound\")}\\n\\n${t(\"errors.cliNotFoundHint\")}\\n\\n${message}`;\n"
                    "      }\n"
                    "      if (\n"
                    "        message.includes(\"Failed to execute claude\") ||\n"
                    "        message.includes(\"Failed to execute codex\")\n"
                    "      ) {\n"
                    "        return `${t(\"errors.cliNotFound\")}\\n\\n${t(\"errors.cliNotFoundHint\")}\\n\\n${message}`;\n"
                    "      }\n",
                ),
            ],
        )

        patch_file(
            "src-tauri/src/workspaces/commands.rs",
            [
                (
                    "    // Verify the CLI is installed\n"
                    "    let cli_installed = match engine_type {\n"
                    "        EngineType::Claude => {\n"
                    "            let claude_bin = {\n"
                    "                let settings = state.app_settings.lock().await;\n"
                    "                settings.claude_bin.clone()\n"
                    "            };\n"
                    "            detect_claude_status(claude_bin.as_deref()).await.installed\n"
                    "        }\n"
                    "        EngineType::Gemini => detect_gemini_status(None).await.installed,\n"
                    "        EngineType::OpenCode => detect_opencode_status(None).await.installed,\n"
                    "        _ => false,\n"
                    "    };\n"
                    "    if !cli_installed {\n"
                    "        return Err(format!(\"CLI_NOT_FOUND:{}\", engine_name));\n"
                    "    }\n",
                    "    // Verify the CLI is installed and preserve the underlying probe error.\n"
                    "    let cli_status = match engine_type {\n"
                    "        EngineType::Claude => {\n"
                    "            let claude_bin = {\n"
                    "                let settings = state.app_settings.lock().await;\n"
                    "                settings.claude_bin.clone()\n"
                    "            };\n"
                    "            detect_claude_status(claude_bin.as_deref()).await\n"
                    "        }\n"
                    "        EngineType::Gemini => detect_gemini_status(None).await,\n"
                    "        EngineType::OpenCode => detect_opencode_status(None).await,\n"
                    "        _ => return Err(format!(\"Unsupported CLI engine: {:?}\", engine_type)),\n"
                    "    };\n"
                    "    if !cli_status.installed {\n"
                    "        if let Some(error) = cli_status.error.filter(|value| !value.trim().is_empty()) {\n"
                    "            return Err(format!(\"CLI_NOT_FOUND:{}\\n\\n{}\", engine_name, error));\n"
                    "        }\n"
                    "        return Err(format!(\"CLI_NOT_FOUND:{}\", engine_name));\n"
                    "    }\n",
                ),
            ],
        )

        patch_file(
            "src-tauri/src/engine/status.rs",
            [
                (
                    "/// Detect Claude Code CLI installation status\n"
                    "pub async fn detect_claude_status(custom_bin: Option<&str>) -> EngineStatus {\n"
                    "    let bin_path = resolve_bin_path(\"claude\", custom_bin);\n"
                    "    let bin = bin_path\n"
                    "        .as_ref()\n"
                    "        .map(|p| p.to_string_lossy().to_string())\n"
                    "        .unwrap_or_else(|| \"claude\".to_string());\n"
                    "    let path_env = build_codex_path_env(custom_bin);\n"
                    "\n"
                    "    let (installed, version, error) = probe_cli_version(&bin, \"claude\", path_env.as_ref()).await;\n"
                    "\n"
                    "    if !installed {\n"
                    "        return not_installed_status(EngineType::Claude, error);\n"
                    "    }\n"
                    "\n"
                    "    let home_dir = get_claude_home_dir();\n"
                    "    let models = get_claude_models(&bin, path_env.as_ref()).await;\n"
                    "    let default_model = models.iter().find(|m| m.default).map(|m| m.id.clone());\n"
                    "\n"
                    "    EngineStatus {\n"
                    "        engine_type: EngineType::Claude,\n"
                    "        installed: true,\n"
                    "        version,\n"
                    "        bin_path: Some(bin.to_string()),\n"
                    "        home_dir: home_dir.map(|p| p.to_string_lossy().to_string()),\n"
                    "        models,\n"
                    "        default_model,\n"
                    "        features: EngineFeatures::claude(),\n"
                    "        error: None,\n"
                    "    }\n"
                    "}\n",
                    "/// Detect Claude Code CLI installation status\n"
                    "pub async fn detect_claude_status(custom_bin: Option<&str>) -> EngineStatus {\n"
                    "    let path_env = build_codex_path_env(custom_bin);\n"
                    "    let custom = custom_bin\n"
                    "        .map(str::trim)\n"
                    "        .filter(|value| !value.is_empty())\n"
                    "        .map(|value| value.to_string());\n"
                    "\n"
                    "    let mut attempted_bin = custom.clone().unwrap_or_else(|| {\n"
                    "        resolve_bin_path(\"claude\", None)\n"
                    "            .map(|p| p.to_string_lossy().to_string())\n"
                    "            .unwrap_or_else(|| \"claude\".to_string())\n"
                    "    });\n"
                    "    let (mut installed, mut version, mut error) =\n"
                    "        probe_cli_version(&attempted_bin, \"claude\", path_env.as_ref()).await;\n"
                    "\n"
                    "    if !installed {\n"
                    "        if let Some(fallback_bin) = resolve_bin_path(\"claude\", None)\n"
                    "            .map(|p| p.to_string_lossy().to_string())\n"
                    "            .filter(|value| value != &attempted_bin)\n"
                    "        {\n"
                    "            let fallback_result =\n"
                    "                probe_cli_version(&fallback_bin, \"claude\", path_env.as_ref()).await;\n"
                    "            if fallback_result.0 {\n"
                    "                attempted_bin = fallback_bin;\n"
                    "                installed = fallback_result.0;\n"
                    "                version = fallback_result.1;\n"
                    "                error = fallback_result.2;\n"
                    "            } else if error.is_none() {\n"
                    "                error = fallback_result.2;\n"
                    "            }\n"
                    "        }\n"
                    "    }\n"
                    "\n"
                    "    if !installed {\n"
                    "        return not_installed_status(EngineType::Claude, error);\n"
                    "    }\n"
                    "\n"
                    "    let home_dir = get_claude_home_dir();\n"
                    "    let models = get_claude_models(&attempted_bin, path_env.as_ref()).await;\n"
                    "    let default_model = models.iter().find(|m| m.default).map(|m| m.id.clone());\n"
                    "\n"
                    "    EngineStatus {\n"
                    "        engine_type: EngineType::Claude,\n"
                    "        installed: true,\n"
                    "        version,\n"
                    "        bin_path: Some(attempted_bin.clone()),\n"
                    "        home_dir: home_dir.map(|p| p.to_string_lossy().to_string()),\n"
                    "        models,\n"
                    "        default_model,\n"
                    "        features: EngineFeatures::claude(),\n"
                    "        error: None,\n"
                    "    }\n"
                    "}\n",
                ),
            ],
        )

        patch_file(
            "src-tauri/src/engine/claude.rs",
            [
                (
                    "        let bin = if let Some(ref custom) = self.bin_path {\n"
                    "            custom.clone()\n"
                    "        } else {\n"
                    "            crate::backend::app_server::find_cli_binary(\"claude\", None)\n"
                    "                .map(|p| p.to_string_lossy().to_string())\n"
                    "                .unwrap_or_else(|| \"claude\".to_string())\n"
                    "        };\n",
                    "        let bin = if let Some(ref custom) = self.bin_path {\n"
                    "            let trimmed = custom.trim();\n"
                    "            if !trimmed.is_empty() && Path::new(trimmed).exists() {\n"
                    "                trimmed.to_string()\n"
                    "            } else {\n"
                    "                crate::backend::app_server::find_cli_binary(\"claude\", None)\n"
                    "                    .map(|p| p.to_string_lossy().to_string())\n"
                    "                    .unwrap_or_else(|| \"claude\".to_string())\n"
                    "            }\n"
                    "        } else {\n"
                    "            crate::backend::app_server::find_cli_binary(\"claude\", None)\n"
                    "                .map(|p| p.to_string_lossy().to_string())\n"
                    "                .unwrap_or_else(|| \"claude\".to_string())\n"
                    "        };\n",
                ),
            ],
        )
        PY
      - npm ci
      - npm exec -- tauri build --no-bundle
      - test -x src-tauri/target/release/cc-gui
      - test -x src-tauri/target/release/cc_gui_daemon
      - install -Dm755 src-tauri/target/release/cc-gui /app/bin/ccgui-bin
      - install -Dm755 src-tauri/target/release/cc_gui_daemon /app/bin/cc_gui_daemon
      - install -Dm755 ccgui.sh /app/bin/ccgui
      - install -Dm755 host-exec.sh /app/bin/host-tools/host-exec
      - install -Dm755 host-shell.sh /app/bin/host-tools/host-shell
      - |
        for cmd in bash bun claude codex cursor fish gemini gh git node npm npx opencode pnpm python python3 sh xdg-mime xdg-open xdg-settings zsh; do
          ln -sf host-exec /app/bin/host-tools/$cmd
        done
      - |
        for cmd in bun claude codex gemini gh git node npm npx opencode pnpm python python3; do
          ln -sf host-tools/host-exec /app/bin/$cmd
        done
      - install -d /app/bin/dist
      - cp -a dist/. /app/bin/dist/
      - install -Dm644 com.zhukunpenglinyutong.ccgui.desktop /app/share/applications/com.zhukunpenglinyutong.ccgui.desktop
      - install -Dm644 com.zhukunpenglinyutong.ccgui.metainfo.xml /app/share/metainfo/com.zhukunpenglinyutong.ccgui.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.zhukunpenglinyutong.ccgui.png
    sources:
      - type: git
        url: https://github.com/zhukunpenglinyutong/desktop-cc-gui.git
        commit: adcda48007635080e227a8d2a9ecb0398249ad0a
      - type: file
        path: com.zhukunpenglinyutong.ccgui.desktop
      - type: file
        path: com.zhukunpenglinyutong.ccgui.metainfo.xml
      - type: file
        path: icon.png
      - type: file
        path: ccgui.sh
      - type: file
        path: host-exec.sh
      - type: file
        path: host-shell.sh
